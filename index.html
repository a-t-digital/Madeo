<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Toko...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0D0D0D;
            --accent-gold: #D4AF37;
            --accent-gold-hover: #AA8C2C;
            --navy-blue: #0A2540;
            --text-white: #FFFFFF;
            --text-muted: #A0AEC0;
            --card-bg: #1A1A1A;
            --border-color: #2D2D2D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg-dark); color: var(--text-white); overflow-x: hidden; line-height: 1.6; }
        
        /* Preloader CSS */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(212, 175, 55, 0.2);
            border-radius: 50%; border-top-color: var(--accent-gold);
            animation: spin 1s ease-in-out infinite; margin-bottom: 20px;
        }
        .blink-text { animation: blink 1.5s infinite; color: var(--accent-gold); font-weight: 600; letter-spacing: 1px; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Container Layout */
        .container { width: 100%; max-width: 600px; margin: 0 auto; background: var(--bg-dark); min-height: 100vh; position: relative; padding-bottom: 100px; }

        /* Hero Section */
        .hero {
            position: relative; height: 320px; background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
            background-image: linear-gradient(to top, rgba(13,13,13,1) 10%, rgba(13,13,13,0.4) 60%, rgba(13,13,13,0.1)), url('https://images.unsplash.com/photo-1617897903246-719242758050?q=80&w=1920');
        }
        .hero-title { font-size: 24pt; font-weight: 700; color: var(--text-white); text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .hero-badge { background: var(--accent-gold); color: var(--bg-dark); font-size: 9pt; font-weight: 700; padding: 4px 10px; width: fit-content; border-radius: 4px; margin-bottom: 8px; text-transform: uppercase; }

        /* Content Wrapper */
        .main-content { padding: 20px; }
        .product-price { font-size: 20pt; color: var(--accent-gold); font-weight: 700; margin: 10px 0; }
        .product-desc { color: var(--text-muted); font-size: 10.5pt; margin-bottom: 25px; text-align: justify; }

        /* Media Section (Images & Video) */
        .media-slider { display: flex; overflow-x: auto; gap: 12px; margin-bottom: 25px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .media-slider::-webkit-scrollbar { display: none; }
        .media-item { flex: 0 0 85%; width: 85%; scroll-snap-align: center; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); background: var(--card-bg); height: 250px; }
        .media-item img { width: 100%; height: 100%; object-fit: cover; }
        .media-item video { width: 100%; height: 100%; object-fit: cover; }

        /* Section Cards */
        .section-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .section-title { font-size: 13pt; font-weight: 600; color: var(--text-white); margin-bottom: 15px; border-left: 4px solid var(--accent-gold); padding-left: 10px; }

        /* Bullet Features */
        .feature-list { list-style: none; }
        .feature-list li { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; font-size: 10pt; color: var(--text-white); }
        .feature-list li i { color: var(--accent-gold); margin-top: 3px; }

        /* Order Form & Inputs */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 9.5pt; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
        .form-control { width: 100%; background: #222; border: 1px solid var(--border-color); color: var(--text-white); padding: 12px 15px; border-radius: 8px; font-size: 10pt; transition: all 0.3s ease; }
        .form-control:focus { outline: none; border-color: var(--accent-gold); box-shadow: 0 0 5px rgba(212,175,55,0.3); }
        select.form-control { cursor: pointer; }

        /* Quantity Control */
        .qty-container { display: flex; align-items: center; background: #222; border: 1px solid var(--border-color); border-radius: 8px; width: fit-content; }
        .qty-btn { background: transparent; border: none; color: var(--text-white); width: 40px; height: 40px; font-size: 14pt; cursor: pointer; transition: background 0.2s; }
        .qty-btn:hover { background: rgba(255,255,255,0.05); }
        .qty-input { width: 50px; text-align: center; border: none; background: transparent; color: var(--text-white); font-size: 11pt; font-weight: bold; pointer-events: none; }

        /* Action Buttons */
        .btn-primary { width: 100%; background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-hover)); color: var(--bg-dark); font-weight: 700; border: none; padding: 15px; border-radius: 8px; font-size: 11pt; cursor: pointer; transition: transform 0.2s ease, opacity 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(212,175,55,0.2); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { width: 100%; background: transparent; border: 1px dashed var(--accent-gold); color: var(--accent-gold); font-weight: 600; padding: 12px; border-radius: 8px; font-size: 10pt; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 15px; transition: all 0.2s; }
        .btn-secondary:hover { background: rgba(212,175,55,0.1); }

        /* Social Media Icons */
        .social-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .social-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border-color); display: flex; justify-content: center; align-items: center; color: var(--text-muted); text-decoration: none; transition: all 0.3s ease; }
        .social-icon:hover { color: var(--accent-gold); border-color: var(--accent-gold); transform: translateY(-3px); }

        /* Bottom Floating Bar / Sidebar Panel Basket */
        .basket-summary-panel { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: rgba(26,26,26,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border-color); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 999; box-shadow: 0 -5px 25px rgba(0,0,0,0.5); }
        .basket-info { display: flex; flex-direction: column; }
        .basket-label { font-size: 8.5pt; color: var(--text-muted); text-transform: uppercase; }
        .basket-total { font-size: 14pt; font-weight: 700; color: var(--accent-gold); }
        .basket-btn { background: var(--navy-blue); color: var(--text-white); font-weight: 600; border: none; padding: 10px 20px; border-radius: 6px; font-size: 9.5pt; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
        .basket-btn:hover { opacity: 0.9; }

        /* Toast Notification */
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 10px 20px; border-radius: 30px; font-size: 9.5pt; opacity: 0; transition: all 0.4s ease; z-index: 10000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); pointer-events: none; text-align: center; width: max-content; max-width: 90%; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="spinner"></div>
        <div class="blink-text">MEMUAT TOKO RESMI...</div>
    </div>

    <div class="container">
        
        <div class="hero" id="heroBg">
            <span class="hero-badge" id="tokoNameBadge">OFFICIAL STORE</span>
            <h1 class="hero-title" id="productTitle">Nama Produk Eksklusif</h1>
        </div>

        <div class="main-content">
            <div class="product-price" id="productPriceDisplay">Rp 0</div>
            <p class="product-desc" id="productDesc">Memuat deskripsi produk lengkap dari pusat data...</p>

            <div class="media-slider" id="mediaSlider">
                </div>

            <div class="section-card">
                <div class="section-title">Pilih Variasi Produk</div>
                <div class="form-group">
                    <select class="form-control" id="variantSelect" onchange="updateSelectedVariant()">
                        </select>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Jumlah Pembelian</label>
                    <div class="qty-container">
                        <button class="qty-btn" onclick="adjustQuantity(-1)">-</button>
                        <input type="number" class="qty-input" id="qtyInput" value="1">
                        <button class="qty-btn" onclick="adjustQuantity(1)">+</button>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <div class="section-title">Keunggulan Produk</div>
                <ul class="feature-list" id="productFeatures">
                    </ul>
            </div>

            <div class="section-card" id="formPemesanan">
                <div class="section-title">Formulir Pengiriman Pesanan</div>
                <div class="form-group">
                    <label>Nama Penerima</label>
                    <input type="text" class="form-control" id="formNama" placeholder="Contoh: Andi Wijaya">
                </div>
                <div class="form-group">
                    <label>Nomor WhatsApp (HP)</label>
                    <input type="tel" class="form-control" id="formHP" placeholder="Contoh: 081234567xxx">
                </div>
                <div class="form-group">
                    <label>Alamat Lengkap Rumah</label>
                    <textarea class="form-control" id="formAlamat" rows="3" placeholder="Nama Jalan, Blok, No. Rumah, Kecamatan, Kota/Kabupaten"></textarea>
                </div>
                <div class="form-group">
                    <label>Catatan Tambahan (Opsional)</label>
                    <input type="text" class="form-control" id="formCatatan" placeholder="Warna cadangan, patokan rumah, dll.">
                </div>
                
                <button class="btn-primary" style="margin-top: 20px;" onclick="prosesTransaksi()">
                    <i class="fab fa-whatsapp"></i> PESAN SEKARANG VIA WHATSAPP
                </button>
            </div>

            <div class="section-card">
                <div class="section-title">Layanan & Kepercayaan Toko</div>
                <ul class="feature-list" id="storeFeatures">
                    </ul>
            </div>

            <button class="btn-secondary" onclick="shareLandingPage()">
                <i class="fas fa-share-alt"></i> Bagikan
            </button>

            <div class="social-container" id="socialLinks">
                </div>

        </div>

        <div class="basket-summary-panel">
            <div class="basket-info">
                <span class="basket-label" id="basketLabelItem">1 Item Terpilih</span>
                <span class="basket-total" id="basketTotalPrice">Rp 0</span>
            </div>
            <button class="basket-btn" onclick="scrollToForm()">
                Beli Sekarang <i class="fas fa-shopping-bag"></i>
            </button>
        </div>

    </div>

    <div class="toast" id="toastNotification">Teks Info Notifikasi</div>

    <script>
        // 1. VARIABLE GLOBAL SCRIPT INTEGRATION - GANTI DENGAN URL DEPLOY WEB APP ANDA
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3GrneFAcA_Fbg4NuMU8PVbJwlSbnTi2KZhf7AaYXf_m1xFVwh5H2Y-qzoEtQ_zwJS/exec";
        
        // Cache data state lokal aplikasi
        let dbStoreData = null;
        let selectedVariant = null;
        let currentQuantity = 1;

        document.addEventListener("DOMContentLoaded", () => {
            initAppStoreData();
        });

        // 2. Optimasi Loading Data - Caching LocalStorage & Async Fetch Workflow
        async function initAppStoreData() {
            const cacheKey = "single_prod_store_cache";
            const cachedData = localStorage.getItem(cacheKey);
            
            // Render cepat menggunakan cache lokal terlebih dahulu jika tersedia
            if (cachedData) {
                try {
                    dbStoreData = JSON.parse(cachedData);
                    renderStoreContent(dbStoreData);
                    document.getElementById("preloader").style.display = "none";
                } catch(e) {
                    localStorage.removeItem(cacheKey);
                }
            }

            // Tetap lakukan fetch background ke Google Sheets Apps Script untuk menjamin akurasi data terbaru
            if (SCRIPT_URL === "URL_WEB_APP_ANDA_DISINI") {
                showToast("Perhatian: Isi SCRIPT_URL dengan tautan Web App Apps Script Anda.");
                document.getElementById("preloader").style.display = "none";
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL);
                const jsonResult = await response.json();
                
                if (jsonResult.status === "success") {
                    dbStoreData = jsonResult;
                    // Simpan ke cache lokal browser
                    localStorage.setItem(cacheKey, JSON.stringify(jsonResult));
                    // Re-render konten dengan data terbaru dari spreadsheet
                    renderStoreContent(dbStoreData);
                } else {
                    console.error("Gagal memuat database:", jsonResult.message);
                }
            } catch (err) {
                console.error("Network error API database:", err);
                showToast("Gagal menyinkronkan data terbaru dari server.");
            } finally {
                document.getElementById("preloader").style.display = "none";
            }
        }

        // 3. Render Pemetaan Data Spreadsheet Ke Elemen User Interface HTML
        function renderStoreContent(data) {
            const config = data.config || {};
            const produk = data.produk || {};

            // Set Title & Nama Toko
            document.title = config.NamaToko || "Official Single Product Store";
            document.getElementById("tokoNameBadge").innerText = config.NamaToko || "OFFICIAL STORE";
            document.getElementById("productTitle").innerText = produk.Nama || "Nama Produk Eksklusif";
            document.getElementById("productDesc").innerText = produk.Deskripsi || "";
            
            // Set Hero Custom Background
            if (config.Background) {
                document.getElementById("heroBg").style.backgroundImage = `linear-gradient(to top, rgba(13,13,13,1) 10%, rgba(13,13,13,0.4) 60%, rgba(13,13,13,0.1)), url('${config.Background}')`;
            }

            // Render Dropdown Dropdown Pilihan Variasi
            const variantSelect = document.getElementById("variantSelect");
            variantSelect.innerHTML = "";
            if (Array.isArray(produk.Variasi) && produk.Variasi.length > 0) {
                produk.Variasi.forEach((v, index) => {
                    const opt = document.createElement("option");
                    opt.value = index;
                    opt.innerText = `${v.nama} — (Rp ${v.harga.toLocaleString('id-ID')})`;
                    variantSelect.appendChild(opt);
                });
                selectedVariant = produk.Variasi[0];
            } else {
                // Fallback default jika data JSON variasi kosong/error
                selectedVariant = { nama: "Default", harga: produk.Harga || 0 };
                const opt = document.createElement("option");
                opt.value = 0;
                opt.innerText = `${produk.Nama} — (Rp ${selectedVariant.harga.toLocaleString('id-ID')})`;
                variantSelect.appendChild(opt);
            }

            // Render Media Carousel Slider (Lazy Loading + MP4 Video Handler)
            const mediaSlider = document.getElementById("mediaSlider");
            mediaSlider.innerHTML = "";
            
            // Parse Gambar List (Pemisah Koma)
            if (produk.Gambar) {
                const imgUrls = produk.Gambar.split(",");
                imgUrls.forEach(url => {
                    if(url.trim()){
                        const div = document.createElement("div");
                        div.className = "media-item";
                        div.innerHTML = `<img src="${url.trim()}" alt="Gambar Produk" loading="lazy">`;
                        mediaSlider.appendChild(div);
                    }
                });
            }
            
            // Tambahkan Video Jika Ada di Spreadsheet
            if (produk.Video) {
                const divVideo = document.createElement("div");
                divVideo.className = "media-item";
                divVideo.innerHTML = `<video controls loading="lazy" preload="none"><source src="${produk.Video.trim()}" type="video/mp4">Browser Anda tidak mendukung video.</video>`;
                mediaSlider.appendChild(divVideo);
            }

            // Render List Fitur Bullet Keunggulan Produk (Pemisah Pipe '|')
            const productFeatures = document.getElementById("productFeatures");
            productFeatures.innerHTML = "";
            if (produk.KeunggulanProduk) {
                produk.KeunggulanProduk.split("|").forEach(feat => {
                    if(feat.trim()){
                        const li = document.createElement("li");
                        li.innerHTML = `<i class="fas fa-check-circle"></i> <span>${feat.trim()}</span>`;
                        productFeatures.appendChild(li);
                    }
                });
            }

            // Render List Fitur Bullet Keunggulan Toko (Pemisah Pipe '|')
            const storeFeatures = document.getElementById("storeFeatures");
            storeFeatures.innerHTML = "";
            if (produk.KeunggulanToko) {
                produk.KeunggulanToko.split("|").forEach(feat => {
                    if(feat.trim()){
                        const li = document.createElement("li");
                        li.innerHTML = `<i class="fas fa-shield-alt"></i> <span>${feat.trim()}</span>`;
                        storeFeatures.appendChild(li);
                    }
                });
            }

            // Render Ikon Sosial Media Penjual
            const socialLinks = document.getElementById("socialLinks");
            socialLinks.innerHTML = "";
            const platforms = [
                { key: "Facebook", icon: "fab fa-facebook-f" },
                { key: "Instagram", icon: "fab fa-instagram" },
                { key: "TikTok", icon: "fab fa-tiktok" },
                { key: "YouTube", icon: "fab fa-youtube" }
            ];
            platforms.forEach(p => {
                if (config[p.key]) {
                    const a = document.createElement("a");
                    a.href = config[p.key];
                    a.className = "social-icon";
                    a.target = "_blank";
                    a.innerHTML = `<i class="${p.icon}"></i>`;
                    socialLinks.appendChild(a);
                }
            });

            // Jalankan Kalkulasi Harga Final Keranjang Belanja Awal
            recalculateBasketDisplay();
        }

        // 4. Manajemen Kalkulasi Keranjang Belanja & Variasi
        function updateSelectedVariant() {
            const idx = document.getElementById("variantSelect").value;
            if (dbStoreData && dbStoreData.produk && Array.isArray(dbStoreData.produk.Variasi)) {
                selectedVariant = dbStoreData.produk.Variasi[idx];
            }
            recalculateBasketDisplay();
        }

        function adjustQuantity(amount) {
            currentQuantity += amount;
            if (currentQuantity < 1) currentQuantity = 1;
            document.getElementById("qtyInput").value = currentQuantity;
            recalculateBasketDisplay();
        }

        function recalculateBasketDisplay() {
            if (!selectedVariant) return;
            const totalPrice = selectedVariant.harga * currentQuantity;
            
            // Update Tampilan Display di UI Utama & Sticky Bottom Panel Bar
            document.getElementById("productPriceDisplay").innerText = `Rp ${selectedVariant.harga.toLocaleString('id-ID')}`;
            document.getElementById("basketLabelItem").innerText = `${currentQuantity}x Pilihan: ${selectedVariant.nama}`;
            document.getElementById("basketTotalPrice").innerText = `Rp ${totalPrice.toLocaleString('id-ID')}`;
        }

        function scrollToForm() {
            document.getElementById("formPemesanan").scrollIntoView({ behavior: 'smooth' });
        }

        // 5. Fungsi Submit Transaksi Async Post Ke Spreadsheet & Otomatis Redirect WA
        async function prosesTransaksi() {
            const nama = document.getElementById("formNama").value.trim();
            const hp = document.getElementById("formHP").value.trim();
            const alamat = document.getElementById("formAlamat").value.trim();
            const catatan = document.getElementById("formCatatan").value.trim();

            if (!nama || !hp || !alamat) {
                showToast("Mohon lengkapi Nama, Nomor HP, dan Alamat Anda!");
                return;
            }

            const totalHarga = selectedVariant.harga * currentQuantity;
            const namaProduk = dbStoreData.produk.Nama || "Produk";

            // Data Object Payload untuk dikirim ke API doPost Spreadsheet
            const payloadData = {
                produk: namaProduk,
                variasi: selectedVariant.nama,
                jumlah: currentQuantity,
                harga: totalHarga,
                nama: nama,
                nomor_hp: hp,
                alamat: alamat,
                catatan: catatan
            };

            showToast("Memproses pesanan Anda...");

            // Jalankan Kirim Data Transaksi Secara Sinkron Asinkronous Agar Tidak Mengganggu UX User
            try {
                fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(payloadData),
                    headers: { "Content-Type": "application/json" }
                });
            } catch (err) {
                console.error("Gagal mencatat log transaksi database:", err);
            }

            // Komposisi Teks Generator WhatsApp Otomatis Sesuai Spesifikasi Format Target
            const waAdmin = dbStoreData.config.WhatsApp || "6281522664431";
            const textWA = `Halo Admin, Saya ingin memesan:\n\n` +
                           `Produk: ${namaProduk} [${selectedVariant.nama}]\n` +
                           `Jumlah: ${currentQuantity} Item\n` +
                           `Harga: Rp ${totalHarga.toLocaleString('id-ID')}\n\n` +
                           `Nama: ${nama}\n` +
                           `Nomor HP: ${hp}\n` +
                           `Alamat: ${alamat}\n` +
                           `Catatan: ${catatan ? catatan : '-'}`;

            const encodedText = encodeURIComponent(textWA);
            const waRedirectUrl = `https://wa.me/${waAdmin}?text=${encodedText}`;

            // Alihkan user ke link aplikasi WA API
            setTimeout(() => {
                window.location.href = waRedirectUrl;
            }, 800);
        }

        // 6. Fungsi Share Link Copy Clipboard System
        function shareLandingPage() {
            let shareUrl = window.location.href;
            if (dbStoreData && dbStoreData.config && dbStoreData.config.LinkShare) {
                shareUrl = dbStoreData.config.LinkShare;
            }

            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast("Tautan landing page berhasil disalin ke papan klip!");
            }).catch(() => {
                showToast("Gagal menyalin tautan secara otomatis.");
            });
        }

        // 7. Global Toast Notification Helper
        function showToast(message) {
            const toast = document.getElementById("toastNotification");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }
    </script>
</body>
</html>
